on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          DB_PASSWORD: supersecret123
        run: pytest
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - name: Deploy
        run: echo "deploying"
